version: "3.5"

services:
  clustta_docs:
    image: clustta_docs:latest
    container_name: clustta_docs
    build:
      context: .
      dockerfile: Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.clustta_docs.rule=Host(`localhost`)" # Replace with your domain
      - "traefik.http.services.clustta_docs.loadbalancer.server.port=80"
    networks:
      - web
    restart: always
    environment:
      CLUSTTA_API_TARGET: https://api.clustta.com

networks:
  web:
    name: clustta_web
