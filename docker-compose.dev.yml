services:
  clustta-docs:
    image: clustta-docs:latest
    container_name: clustta-docs
    build:
      context: .
      dockerfile: Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.clustta-docs.rule=Host(`localhost`)"
      - "traefik.http.services.clustta-docs.loadbalancer.server.port=80"
    networks:
      - web
    restart: always
    environment:
      CLUSTTA_API_TARGET: https://api.clustta.com

networks:
  web:
    external: true
    name: clustta-web
